name: OpenSSF Scorecard

on:
  # Run on every push to main so the score stays current.
  push:
    branches: ["main"]
  # Weekly scheduled run catches upstream vulnerability disclosures even
  # when nothing has been pushed.
  schedule:
    - cron: "30 1 * * 6"   # 01:30 UTC every Saturday
  # Allows the workflow to be triggered manually from the Actions tab.
  workflow_dispatch:

# Scorecard requires read access to all repo content, and write access to
# security-events (to upload SARIF) and id-token (for keyless signing).
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      id-token: write          # keyless signing via Sigstore
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results makes the score visible on the public Scorecard
          # API so the README badge can display a live score.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          sarif_file: results.sarif
